version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-multimedia_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret123}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  coordinator:
    build: ./coordinator
    container_name: coordinator
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      COORDINATOR_HOST: coordinator
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ``test_files`` is the host-side dataset produced by
    # ``client/generate_test_files.py`` and is mounted read-only at
    # ``/media/input`` so jobs created by the CLI (which sends paths like
    # ``./test_files/foo.mp4``) resolve to a real file inside the container.
    # Without this bind mount the named volume is empty and every job lands
    # in ``failed`` status because ffmpeg cannot read the input.
    volumes:
      - ./test_files:/media/input:ro
      - ./media_output:/media/output
    networks:
      - backend
      - frontend

  worker-1:
    build: ./worker
    container_name: worker-1
    hostname: worker-1
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      WORKER_ID: worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./test_files:/media/input:ro
      - ./media_output:/media/output
    networks:
      - backend

  worker-2:
    build: ./worker
    container_name: worker-2
    hostname: worker-2
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      WORKER_ID: worker-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./test_files:/media/input:ro
      - ./media_output:/media/output
    networks:
      - backend

  worker-3:
    build: ./worker
    container_name: worker-3
    hostname: worker-3
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      WORKER_ID: worker-3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./test_files:/media/input:ro
      - ./media_output:/media/output
    networks:
      - backend

  dashboard:
    build: ./dashboard
    container_name: dashboard
    env_file: .env
    environment:
      REACT_APP_COORDINATOR_URL: http://coordinator:8000
    ports:
      - '3000:3000'
    depends_on:
      - coordinator
    networks:
      - frontend

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - '9090:9090'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      - coordinator
    networks:
      - backend
      - monitoring

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./infra/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - '3001:3000'
    depends_on:
      - prometheus
    networks:
      - monitoring

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    volumes:
      - ./infra/promtail/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - monitoring

volumes:
  pg_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  monitoring:
    driver: bridge

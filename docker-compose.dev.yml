version: '3.9'

services:
  postgres:
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  coordinator:
    build:
      context: ./coordinator
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./coordinator:/app

  worker-1:
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - ./worker:/app

  worker-2:
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - ./worker:/app

  worker-3:
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - ./worker:/app

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    command: npm run dev
    volumes:
      - ./dashboard:/app

  adminer:
    image: adminer:latest
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    networks:
      - backend

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - backend

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install ruff black
      - name: Run ruff
        run: ruff check .
      - name: Check code formatting
        run: black --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: secret123
          POSTGRES_DB: multimedia_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r coordinator/requirements.txt
          pip install -r worker/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx fakeredis aiosqlite
      - name: Run tests
        run: |
          set +e
          pytest tests/ -v --cov=coordinator --cov=worker
          ec=$?
          if [ $ec -eq 5 ]; then
            echo "::notice::No tests collected — treating as pass"
            exit 0
          fi
          exit $ec
        env:
          POSTGRES_HOST: localhost
          REDIS_HOST: localhost

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build coordinator image
        run: docker build -t coordinator:latest ./coordinator
      - name: Build worker image
        run: docker build -t worker:latest ./worker

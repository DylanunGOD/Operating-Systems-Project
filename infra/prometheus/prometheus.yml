global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'multimedia-distributed'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'coordinator'
    static_configs:
      - targets: ['coordinator:8000']
    metrics_path: '/metrics'

  - job_name: 'worker-1'
    static_configs:
      - targets: ['worker-1:9100']
    metrics_path: '/metrics'

  - job_name: 'worker-2'
    static_configs:
      - targets: ['worker-2:9100']
    metrics_path: '/metrics'

  - job_name: 'worker-3'
    static_configs:
      - targets: ['worker-3:9100']
    metrics_path: '/metrics'
